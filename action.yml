name: 'Spikybot Code Agent'
description: 'Autonomous coding agent running on GitHub Actions with Claude Code'
author: 'SpiceEngine'
inputs:
  github-token: {description: 'GitHub Token', required: false}
  model: {description: 'Claude model to use (sonnet, opus)', required: false, default: 'sonnet'}
  thinking: {description: 'Enable thinking mode (true/false)', required: false, default: 'false'}
  additional-prompt: {description: 'Additional Prompt', required: false}
  redis-url: {description: 'Upstash Redis Rest URL', required: false}
  redis-token: {description: 'Upstash Redis Rest Token', required: false}
runs:
  using: 'composite'
  steps:
    - name: Setup Claude Code
      shell: bash
      run: |
        npm install -g @anthropic-ai/claude-code
    - name: Check if should respond
      shell: bash
      id: should_respond
      run: |
        # Get the comment/issue body
        COMMENT_BODY="${{ github.event.comment.body || github.event.issue.body || github.event.pull_request.body }}"
        
        # Check if spikybot is mentioned or assigned
        MENTIONED=$(echo "$COMMENT_BODY" | grep -c "@spikybot" || echo "0")
        ASSIGNED="${{ contains(toJSON(github.event.issue.assignees || github.event.pull_request.assignees), '"spikybot"') }}"
        
        # Check if actor is spikybot (avoid self-response)
        if [ "${{ github.actor }}" = "spikybot" ]; then
          echo "should_respond=false" >> $GITHUB_OUTPUT
          echo "Skipping: Actor is spikybot"
          exit 0
        fi
        
        # Respond if mentioned or assigned
        if [ "$MENTIONED" -gt 0 ] || [ "$ASSIGNED" = "true" ]; then
          echo "should_respond=true" >> $GITHUB_OUTPUT
          echo "Should respond: mentioned=$MENTIONED, assigned=$ASSIGNED"
        else
          echo "should_respond=false" >> $GITHUB_OUTPUT
          echo "Skipping: No mention or assignment"
        fi
    - name: Execute Spikybot
      if: steps.should_respond.outputs.should_respond == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        REDIS_URL: ${{ inputs.redis-url }}
        REDIS_TOKEN: ${{ inputs.redis-token }}
      run: |
        # Create prompt
        cat > .spikybot-prompt.txt << 'EOF'
        あなたはSpikybot、GitHub Actionsで動作する自律型コーディングエージェントです。

        ## コンテキスト情報
        - Repository: ${{ github.repository }}
        - Event: ${{ github.event_name }}
        - Actor: ${{ github.actor }}
        - Issue/PR Number: ${{ github.event.issue.number || github.event.pull_request.number }}
        - Comment Body: "${{ github.event.comment.body || github.event.issue.body || github.event.pull_request.body }}"

        ## 基本ルール
        1. ユーザーのリクエストを理解し、適切な作業を実行してください
        2. 作業開始時に簡潔な応答をしてください
        3. 作業完了時に@${{ github.actor }}をメンションして結果を報告してください
        4. ファイル作成、コード修正、PR作成などのタスクを実行できます
        5. セキュリティ関連の情報（環境変数、シークレット）は絶対に公開しないでください

        ## タスクの実行
        上記のコメントに基づいて適切な作業を実行してください。

        ${{ inputs.additional-prompt }}
        EOF

        # Execute with Claude Code
        CLAUDE_CMD="claude -p --output-format stream-json --verbose --model ${{ inputs.model }}"
        if [ "${{ inputs.thinking }}" = "true" ]; then
          CLAUDE_CMD="$CLAUDE_CMD --thinking"
        fi
        
        cat .spikybot-prompt.txt | $CLAUDE_CMD